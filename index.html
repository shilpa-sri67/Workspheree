<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkSphere</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0b0d14;
    color: #e8eaf0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 15% 10%, rgba(79,142,247,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 5%, rgba(167,139,250,0.10) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 50% 90%, rgba(52,211,153,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero {
    position: relative;
    text-align: center;
    padding: 0 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(79,142,247,0.08);
    border: 1px solid rgba(79,142,247,0.22);
    color: #4f8ef7;
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    margin-bottom: 36px;
    animation: fadeDown 0.6s ease both;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4f8ef7;
    box-shadow: 0 0 8px #4f8ef7;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3rem, 7vw, 5.5rem);
    font-weight: 800;
    line-height: 1.06;
    letter-spacing: -0.03em;
    color: #fff;
    max-width: 820px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  h1 .grad {
    background: linear-gradient(135deg, #4f8ef7 0%, #a78bfa 50%, #34d399 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub {
    margin-top: 28px;
    max-width: 500px;
    color: #6b7280;
    font-size: 1.05rem;
    line-height: 1.75;
    font-weight: 300;
    animation: fadeDown 0.6s 0.2s ease both;
  }

  .btns {
    margin-top: 44px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeDown 0.6s 0.3s ease both;
  }

  .btn-primary {
    background: #4f8ef7;
    border: none;
    color: #fff;
    padding: 15px 36px;
    border-radius: 10px;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 32px rgba(79,142,247,0.35);
    text-decoration: none;
    display: inline-block;
  }

  .btn-primary:hover {
    background: #6a9ef9;
    box-shadow: 0 0 44px rgba(79,142,247,0.55);
    transform: translateY(-2px);
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.13);
    color: #e8eaf0;
    padding: 15px 36px;
    border-radius: 10px;
    font-size: 1rem;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-block;
  }

  .btn-ghost:hover {
    background: #111520;
    border-color: rgba(255,255,255,0.22);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="hero">
    <div class="badge">AI-powered · Built for engineering teams</div>
    <h1>Your team's intelligence,<br><span class="grad">unified in one place</span></h1>
    <p class="sub">WorkSphere brings together workload tracking, meeting insights, hiring pipelines, and knowledge management — with an AI assistant that makes sense of it all.</p>
    <div class="btns">
      <a href="login.html" class="btn-primary">Get started free</a>
      <a href="#" class="btn-ghost">Learn more</a>
    </div>
  </div>
</body>
</html>
